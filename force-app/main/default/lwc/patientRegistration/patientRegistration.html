<template>
    <lightning-card title="Register New Patient" icon-name="standard:patient">
        <div class="form-wrap">

            <div class="form-grid">
                <lightning-input label="Full Name" value={patient.Name}
                    data-field="Name" onchange={handleChange} required></lightning-input>

                <lightning-input type="date" label="Date of Birth"
                    value={patient.Date_of_Birth__c}
                    data-field="Date_of_Birth__c" onchange={handleChange}></lightning-input>

                <lightning-combobox label="Gender"
                    value={patient.Gender__c}
                    options={genderOptions}
                    data-field="Gender__c" onchange={handleChange}></lightning-combobox>

                <lightning-combobox label="Blood Group"
                    value={patient.Blood_Group__c}
                    options={bloodGroupOptions}
                    data-field="Blood_Group__c" onchange={handleChange}></lightning-combobox>

                <lightning-input type="tel" label="Phone"
                    value={patient.Phone__c}
                    data-field="Phone__c" onchange={handleChange}></lightning-input>

                <lightning-input type="email" label="Email"
                    value={patient.Email__c}
                    data-field="Email__c" onchange={handleChange}></lightning-input>

                <lightning-combobox label="Status"
                    value={patient.Status__c}
                    options={statusOptions}
                    data-field="Status__c" onchange={handleChange}></lightning-combobox>
            </div>

            <lightning-textarea label="Address"
                value={patient.Address__c}
                data-field="Address__c" onchange={handleChange}
                class="full-width"></lightning-textarea>

            <template if:true={errorMessage}>
                <div class="error-msg">{errorMessage}</div>
            </template>

            <div class="form-footer">
                <lightning-button label="Cancel" onclick={handleCancel}></lightning-button>
                <lightning-button label="Save Patient" variant="brand"
                    onclick={handleSave} disabled={isSaving}></lightning-button>
            </div>

        </div>
    </lightning-card>
</template>
